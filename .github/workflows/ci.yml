name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci --legacy-peer-deps

      - name: Validate Vega specifications
        id: catalog
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run build:catalog

      - name: Build site
        id: site
        if: steps.install.outcome == 'success' && steps.catalog.outcome == 'success'
        continue-on-error: true
        run: npm run build:site

      - name: Comment CI summary on pull request
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- vega-library-ci-summary -->';

            const toStatus = (outcome, skippedLabel = 'not run') => {
              if (outcome === 'success') return { emoji: '✅', label: 'Successful' };
              if (outcome === 'failure') return { emoji: '❌', label: 'Failed' };
              if (outcome === 'cancelled') return { emoji: '⏹️', label: 'Cancelled' };
              return { emoji: '⏭️', label: skippedLabel };
            };

            const install = toStatus('${{ steps.install.outcome }}');
            const catalog = toStatus('${{ steps.catalog.outcome }}', 'Not run');
            const site = toStatus('${{ steps.site.outcome }}', 'Not run');

            const body = `${marker}
            ## CI Summary

            | Check | Status |
            | --- | --- |
            | Dependency install | ${install.emoji} ${install.label} |
            | Vega specification validation | ${catalog.emoji} ${catalog.label} |
            | Site build | ${site.emoji} ${site.label} |`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Fail if checks failed
        if: always()
        run: |
          if [ "${{ steps.install.outcome }}" != "success" ]; then
            echo "Dependency installation failed."
            exit 1
          fi

          if [ "${{ steps.catalog.outcome }}" != "success" ]; then
            echo "Vega specification validation failed."
            exit 1
          fi

          if [ "${{ steps.site.outcome }}" != "success" ]; then
            echo "Site build failed."
            exit 1
          fi
